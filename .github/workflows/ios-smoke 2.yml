name: iOS Smoke

on:
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Run iOS smoke test
        run: |
          chmod +x scripts/ios_smoke.sh
          scripts/ios_smoke.sh
